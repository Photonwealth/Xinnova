<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg-spad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0A0A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#141210;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="avalanche" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#A855F7;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:0.2" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect x="0" y="0" width="800" height="500" fill="url(#bg-spad)"/>

  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" font-family="Inter,sans-serif" font-size="20" font-weight="700" fill="#C49B3C">How a SPAD Detects a Single Photon</text>

  <!-- PN Junction - reverse biased above breakdown -->
  <g transform="translate(400, 240)">
    <!-- Depletion region -->
    <rect x="-60" y="-80" width="120" height="160" rx="4" fill="#1B2838" stroke="#4A90D9" stroke-width="1.5"/>

    <!-- N+ region (top) -->
    <rect x="-55" y="-75" width="110" height="30" rx="2" fill="#E74C3C" opacity="0.7"/>
    <text x="0" y="-56" text-anchor="middle" font-family="Inter,sans-serif" font-size="12" fill="#FFFFFF" font-weight="600">N+</text>

    <!-- P+ region (bottom) -->
    <rect x="-55" y="45" width="110" height="30" rx="2" fill="#4A90D9" opacity="0.7"/>
    <text x="0" y="64" text-anchor="middle" font-family="Inter,sans-serif" font-size="12" fill="#FFFFFF" font-weight="600">P+</text>

    <!-- Depletion multiplication zone -->
    <rect x="-48" y="-40" width="96" height="80" rx="2" fill="#7C3AED" opacity="0.15" stroke="#A855F7" stroke-width="1" stroke-dasharray="4,3"/>
    <text x="0" y="-5" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" fill="#A855F7">Avalanche</text>
    <text x="0" y="10" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" fill="#A855F7">Multiplication</text>

    <!-- Bias label -->
    <text x="80" y="-60" font-family="Inter,sans-serif" font-size="11" fill="#C49B3C">V_B > V_BR</text>
    <text x="80" y="-45" font-family="Inter,sans-serif" font-size="10" fill="#A6874A">(above breakdown)</text>

    <!-- Incoming photon arrow -->
    <path d="M-200,-120 L-70,-75" stroke="#FFD700" stroke-width="2" marker-end="url(#arrow)" filter="url(#glow)"/>
    <circle cx="-200" cy="-120" r="4" fill="#FFD700" filter="url(#glow)"/>
    <text x="-230" y="-125" font-family="Inter,sans-serif" font-size="12" fill="#FFD700">hν (photon)</text>

    <!-- Electron avalanche arrows -->
    <g opacity="0.6">
      <path d="M-30,-40 L-35,15" stroke="#A855F7" stroke-width="1"/>
      <path d="M-15,-40 L-20,25" stroke="#A855F7" stroke-width="1.2"/>
      <path d="M0,-40 L-5,35" stroke="#A855F7" stroke-width="1.4"/>
      <path d="M15,-40 L10,25" stroke="#A855F7" stroke-width="1.2"/>
      <path d="M30,-40 L25,15" stroke="#A855F7" stroke-width="1"/>
    </g>

    <!-- Current output -->
    <path d="M0,75 L0,120" stroke="#FFFFFF" stroke-width="1.5"/>
    <path d="M0,120 L80,120" stroke="#FFFFFF" stroke-width="1.5"/>
    <text x="90" y="124" font-family="Inter,sans-serif" font-size="11" fill="#FFFFFF">Output: digital pulse</text>

    <!-- Pulse shape -->
    <path d="M180,140 L200,140 L205,100 L210,140 L250,140" stroke="#E34D59" stroke-width="1.5" fill="none"/>
    <text x="215" y="135" font-family="Inter,sans-serif" font-size="10" fill="#E34D59">V_out</text>
  </g>

  <!-- Dead time label -->
  <g transform="translate(400, 430)">
    <text x="0" y="0" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" fill="#A6874A">Dead time: 10-100 ns after each avalanche</text>
  </g>

  <!-- Bottom note -->
  <text x="400" y="480" text-anchor="middle" font-family="Inter,sans-serif" font-size="9" fill="#5A5450">Fig.TECH.03 — SPAD avalanche principle | Xinnova</text>
</svg>
