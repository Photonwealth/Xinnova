<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" width="800" height="480">
  <defs>
    <linearGradient id="bg-mkt" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0A0A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#141210;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="800" height="480" fill="url(#bg-mkt)"/>

  <text x="400" y="40" text-anchor="middle" font-family="Inter,sans-serif" font-size="20" font-weight="700" fill="#C49B3C">SPAD Addressable Market by Application</text>
  <text x="400" y="62" text-anchor="middle" font-family="Inter,sans-serif" font-size="12" fill="#A6874A">Estimated revenue, USD billions</text>

  <!-- Chart area -->
  <g transform="translate(100, 90)">
    <!-- Y-axis -->
    <line x1="0" y1="0" x2="0" y2="300" stroke="#2A2520" stroke-width="1"/>
    <!-- X-axis -->
    <line x1="0" y1="300" x2="620" y2="300" stroke="#2A2520" stroke-width="1"/>

    <!-- Y-axis labels -->
    <text x="-10" y="300" text-anchor="end" font-family="Inter,sans-serif" font-size="10" fill="#5A5450">$0</text>
    <text x="-10" y="225" text-anchor="end" font-family="Inter,sans-serif" font-size="10" fill="#5A5450">$1B</text>
    <text x="-10" y="150" text-anchor="end" font-family="Inter,sans-serif" font-size="10" fill="#5A5450">$2B</text>
    <text x="-10" y="75" text-anchor="end" font-family="Inter,sans-serif" font-size="10" fill="#5A5450">$3B</text>
    <text x="-10" y="0" text-anchor="end" font-family="Inter,sans-serif" font-size="10" fill="#5A5450">$4B</text>

    <!-- Grid lines -->
    <line x1="0" y1="75" x2="620" y2="75" stroke="#2A2520" stroke-width="0.5" stroke-dasharray="4,3"/>
    <line x1="0" y1="150" x2="620" y2="150" stroke="#2A2520" stroke-width="0.5" stroke-dasharray="4,3"/>
    <line x1="0" y1="225" x2="620" y2="225" stroke="#2A2520" stroke-width="0.5" stroke-dasharray="4,3"/>

    <!-- Group 1: Mobile dToF -->
    <!-- 2024 bar: $0.3B → 300/4000*300 = 22.5px -->
    <rect x="30" y="277.5" width="70" height="22.5" fill="#7C3AED" rx="2"/>
    <!-- 2028E bar: $1.2B → 1200/4000*300 = 90px -->
    <rect x="30" y="210" width="70" height="90" fill="#A855F7" rx="2" opacity="0.8"/>

    <text x="65" y="300" text-anchor="middle" font-family="Inter,sans-serif" font-size="9" fill="#5A5450" transform="rotate(-45, 65, 300)">Mobile dToF</text>

    <!-- Group 2: Automotive LiDAR -->
    <rect x="160" y="262.5" width="70" height="37.5" fill="#7C3AED" rx="2"/>
    <rect x="160" y="37.5" width="70" height="262.5" fill="#A855F7" rx="2" opacity="0.8"/>

    <text x="195" y="300" text-anchor="middle" font-family="Inter,sans-serif" font-size="9" fill="#5A5450" transform="rotate(-45, 195, 300)">Automotive LiDAR</text>

    <!-- Group 3: Medical/Industrial -->
    <rect x="290" y="285" width="70" height="15" fill="#7C3AED" rx="2"/>
    <rect x="290" y="262.5" width="70" height="37.5" fill="#A855F7" rx="2" opacity="0.8"/>

    <text x="325" y="300" text-anchor="middle" font-family="Inter,sans-serif" font-size="9" fill="#5A5450" transform="rotate(-45, 325, 300)">Medical / Industrial</text>

    <!-- 2024 label -->
    <rect x="440" y="265" width="16" height="16" fill="#7C3AED" rx="2"/>
    <text x="462" y="277" font-family="Inter,sans-serif" font-size="11" fill="#A6874A">2024</text>

    <!-- 2028E label -->
    <rect x="440" y="240" width="16" height="16" fill="#A855F7" rx="2" opacity="0.8"/>
    <text x="462" y="252" font-family="Inter,sans-serif" font-size="11" fill="#A6874A">2028E</text>

    <!-- Value labels -->
    <text x="65" y="200" text-anchor="middle" font-family="Inter,sans-serif" font-size="10" fill="#C49B3C">$1.2B</text>
    <text x="65" y="295" text-anchor="middle" font-family="Inter,sans-serif" font-size="9" fill="#5A5450">$0.3B</text>

    <text x="195" y="30" text-anchor="middle" font-family="Inter,sans-serif" font-size="10" fill="#C49B3C">$3.5B</text>

    <text x="325" y="255" text-anchor="middle" font-family="Inter,sans-serif" font-size="10" fill="#C49B3C">$0.5B</text>
  </g>

  <!-- CAGR tags -->
  <g transform="translate(100, 90)">
    <rect x="30" y="185" width="70" height="18" rx="8" fill="#1C1814" stroke="#C49B3C" stroke-width="0.5"/>
    <text x="65" y="197" text-anchor="middle" font-family="Inter,sans-serif" font-size="9" fill="#C49B3C">CAGR 40%</text>

    <rect x="160" y="12" width="70" height="18" rx="8" fill="#1C1814" stroke="#C49B3C" stroke-width="0.5"/>
    <text x="195" y="24" text-anchor="middle" font-family="Inter,sans-serif" font-size="9" fill="#C49B3C">CAGR 60%</text>

    <rect x="290" y="237" width="70" height="18" rx="8" fill="#1C1814" stroke="#C49B3C" stroke-width="0.5"/>
    <text x="325" y="249" text-anchor="middle" font-family="Inter,sans-serif" font-size="9" fill="#C49B3C">CAGR 25%</text>
  </g>

  <text x="400" y="460" text-anchor="middle" font-family="Inter,sans-serif" font-size="9" fill="#5A5450">Fig.DATA.04 — SPAD market forecast by application | Sources: Yole, industry reports | Xinnova</text>
</svg>
