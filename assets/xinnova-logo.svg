<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 520" width="400" height="520">
  <defs>
    <rect id="bg" x="0" y="0" width="400" height="520" fill="#000000"/>

    <!-- 12道金色太阳辐射 -->
    <g id="sunburst">
      <line x1="200" y1="200" x2="200" y2="40" stroke="#C4A35A" stroke-width="1.5" opacity="0.6"/>
      <line x1="200" y1="200" x2="200" y2="360" stroke="#C4A35A" stroke-width="1.5" opacity="0.6"/>
      <line x1="200" y1="200" x2="40" y2="200" stroke="#C4A35A" stroke-width="1.5" opacity="0.6"/>
      <line x1="200" y1="200" x2="360" y2="200" stroke="#C4A35A" stroke-width="1.5" opacity="0.6"/>
      <line x1="200" y1="200" x2="87" y2="87" stroke="#C4A35A" stroke-width="1.5" opacity="0.6"/>
      <line x1="200" y1="200" x2="313" y2="87" stroke="#C4A35A" stroke-width="1.5" opacity="0.6"/>
      <line x1="200" y1="200" x2="87" y2="313" stroke="#C4A35A" stroke-width="1.5" opacity="0.6"/>
      <line x1="200" y1="200" x2="313" y2="313" stroke="#C4A35A" stroke-width="1.5" opacity="0.6"/>
      <line x1="200" y1="200" x2="117" y2="52" stroke="#C4A35A" stroke-width="1" opacity="0.4"/>
      <line x1="200" y1="200" x2="283" y2="52" stroke="#C4A35A" stroke-width="1" opacity="0.4"/>
      <line x1="200" y1="200" x2="117" y2="348" stroke="#C4A35A" stroke-width="1" opacity="0.4"/>
      <line x1="200" y1="200" x2="283" y2="348" stroke="#C4A35A" stroke-width="1" opacity="0.4"/>
      <line x1="200" y1="200" x2="52" y2="117" stroke="#C4A35A" stroke-width="1" opacity="0.4"/>
      <line x1="200" y1="200" x2="348" y2="117" stroke="#C4A35A" stroke-width="1" opacity="0.4"/>
      <line x1="200" y1="200" x2="52" y2="283" stroke="#C4A35A" stroke-width="1" opacity="0.4"/>
      <line x1="200" y1="200" x2="348" y2="283" stroke="#C4A35A" stroke-width="1" opacity="0.4"/>
    </g>

    <linearGradient id="orbit-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#C4A35A;stop-opacity:0" />
      <stop offset="30%" style="stop-color:#F5D68E;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#F5D68E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C4A35A;stop-opacity:0" />
    </linearGradient>

    <linearGradient id="purple-x" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9B59B6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7B2D8E;stop-opacity:1" />
    </linearGradient>

    <filter id="gold-glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="yellow-glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Pure black background -->
  <use href="#bg"/>

  <!-- Golden sunburst (12 symmetrical rays) -->
  <g opacity="0.7">
    <use href="#sunburst"/>
  </g>

  <!-- Golden orbit rings -->
  <g transform="translate(200,200)" filter="url(#gold-glow)">
    <ellipse cx="0" cy="0" rx="120" ry="30" fill="none"
             stroke="url(#orbit-grad)" stroke-width="2"
             transform="rotate(-35)"/>
    <ellipse cx="0" cy="0" rx="110" ry="25" fill="none"
             stroke="url(#orbit-grad)" stroke-width="1.5"
             transform="rotate(45)"/>
  </g>

  <!-- White circular wafer (pixel base) -->
  <circle cx="200" cy="200" r="48" fill="#FFFFFF" opacity="0.95"/>
  <circle cx="200" cy="200" r="46" fill="none" stroke="#E8E0D5" stroke-width="0.5"/>
  <circle cx="200" cy="200" r="48" fill="none" stroke="#C4A35A" stroke-width="0.3" opacity="0.3"/>
  <circle cx="200" cy="200" r="40" fill="none" stroke="#E8E0D5" stroke-width="0.3" opacity="0.2"/>

  <!-- Electric Purple X -->
  <g transform="translate(200,200)">
    <path d="M-28,-30 L28,30" stroke="url(#purple-x)" stroke-width="16" stroke-linecap="round"/>
    <path d="M28,-30 L-28,30" stroke="url(#purple-x)" stroke-width="16" stroke-linecap="round"/>
    <!-- X edge highlight -->
    <path d="M-28,-30 L28,30" stroke="#B07CC6" stroke-width="4" stroke-linecap="round" opacity="0.4"/>
    <path d="M28,-30 L-28,30" stroke="#B07CC6" stroke-width="4" stroke-linecap="round" opacity="0.4"/>
  </g>

  <!-- Lemon yellow photon dot at center -->
  <g transform="translate(200,200)" filter="url(#yellow-glow)">
    <circle cx="0" cy="0" r="7" fill="#FFD700"/>
    <circle cx="0" cy="0" r="4" fill="#FFF8DC"/>
    <circle cx="0" cy="0" r="12" fill="none" stroke="#FFD700" stroke-width="1" opacity="0.6"/>
  </g>

  <!-- PhotonWealth · Xinova -->
  <text x="200" y="445" text-anchor="middle"
        font-family="'Inter','Helvetica Neue',Arial,sans-serif"
        font-size="24" font-weight="600" letter-spacing="3"
        fill="#FFFFFF">PhotonWealth · Xinova</text>

  <!-- light · gold · insight -->
  <text x="200" y="478" text-anchor="middle"
        font-family="'Inter','Helvetica Neue',Arial,sans-serif"
        font-size="11" letter-spacing="5"
        fill="#C4A35A" opacity="0.8">light · gold · insight</text>
</svg>
